services:
  arrgo:
    build:
      context: .
      args:
        - GO_VERSION=${GO_VERSION:-1.26.1}
    container_name: arrgo
    # Port 5003 stays mapped so you can still hit it via Unraid IP if needed,
    # but Caddy will now talk to it via the 'coven' bridge.
    ports:
      - 5003:5003
    environment:
      # Use service names defined in this file or other 'coven' containers
      - DATABASE_URL=${DATABASE_URL:-postgres://arrgo:${POSTGRES_PASSWORD}@arrgo-db:5432/arrgo?sslmode=disable}
      - SESSION_SECRET=${SESSION_SECRET}
      - PORT=${PORT:-5003}
      - ENV=${ENV:-development}
      - DEBUG=${DEBUG:-false}
      - BUILD_VERSION=1
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-error}
      - MOVIES_PATH=${MOVIES_PATH:-/data/movies}
      - SHOWS_PATH=${SHOWS_PATH:-/data/shows}
      - INCOMING_MOVIES_PATH=${INCOMING_MOVIES_PATH:-/data/incoming/movies}
      - INCOMING_SHOWS_PATH=${INCOMING_SHOWS_PATH:-/data/incoming/shows}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TVDB_API_KEY=${TVDB_API_KEY}
      - OPENSUBTITLES_API_KEY=${OPENSUBTITLES_API_KEY}
      - OPENSUBTITLES_USER=${OPENSUBTITLES_USER}
      - OPENSUBTITLES_PASS=${OPENSUBTITLES_PASS}
      - QBITTORRENT_URL=${QBITTORRENT_URL:-http://arrgo-qbittorrent:8080}
      - QBITTORRENT_USER=${QBITTORRENT_USER}
      - QBITTORRENT_PASS=${QBITTORRENT_PASS}
      - CLOUDFLARE_BYPASS_URL=${CLOUDFLARE_BYPASS_URL:-http://byparr:8191}
      # Point to the Jellyfin container name on the coven network
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@arrgo.local}
      - ENABLE_SUBSYNC=${ENABLE_SUBSYNC:-false}
      - FFSUBSYNC_URL=${FFSUBSYNC_URL:-http://ffsubsync-api:8080}
    depends_on:
      db:
        condition: service_healthy
      qbittorrent:
        condition: service_started
      byparr:
        condition: service_healthy
    volumes:
      - ./server/templates:/app/templates:ro
      - ./server/static:/app/static:ro
      - ./posters:/app/data/posters
      - ${MEDIA_PATH:-/mnt/user/media}:/data
    networks:
      - coven
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: dockge
      net.unraid.docker.webui: http://${SERVER_IP:-127.0.0.1}:5003

  db:
    image: postgres:16-alpine
    container_name: arrgo-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-arrgo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-arrgo}
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-error}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-arrgo} -d ${POSTGRES_DB:-arrgo}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coven
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: dockge-db

  qbittorrent:
    image: binhex/arch-qbittorrentvpn:latest
    container_name: arrgo-qbittorrent
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    environment:
      - VPN_ENABLED=${VPN_ENABLED:-yes}
      - VPN_PROV=${VPN_PROV:-pia}
      - VPN_CLIENT=openvpn
      - VPN_USER=${PIA_USER}
      - VPN_PASS=${PIA_PASSWORD}
      - LAN_NETWORK=${LAN_NETWORK:-192.168.10.0/24}
      - WEBUI_PORT=8080
      - UMASK=000
      - PUID=99
      - PGID=100
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/qbittorrent:/config
      - ${MEDIA_PATH:-/mnt/user/media}/incoming:/data/incoming
    networks:
      - coven
    restart: unless-stopped
    labels:
      net.unraid.docker.managed: dockge-qbittorrent

  byparr:
    image: ghcr.io/thephaseless/byparr
    container_name: byparr
    environment:
      - TZ=${TZ:-America/New_York}
    networks:
      - coven
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ffsubsync-api:
    build:
      context: .
      dockerfile: ffsubsync-api/Dockerfile
      args:
        - GO_VERSION=${GO_VERSION:-1.26.1}
    container_name: ffsubsync-api
    environment:
      - ENABLE_SUBSYNC=${ENABLE_SUBSYNC:-false}
      - GOLOG_LOG_LEVEL=${GOLOG_LOG_LEVEL:-error}
      - MOVIES_PATH=${MOVIES_PATH:-/data/movies}
      - SHOWS_PATH=${SHOWS_PATH:-/data/shows}
    command: |
      sh -c "if [ \"$${ENABLE_SUBSYNC}\" = \"true\" ]; then
        exec ./ffsubsync-api;
      else
        echo 'SubSync is disabled (ENABLE_SUBSYNC=false). Exiting...';
        exit 0;
      fi"
    volumes:
      - ${MEDIA_PATH:-/mnt/user/media}:/data
    networks:
      - coven
    restart: on-failure

networks:
  coven:
    external: true
