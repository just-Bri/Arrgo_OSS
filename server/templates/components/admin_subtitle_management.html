{{define "admin_subtitle_management"}}
<script>
    function scanSubtitles(event) {
        const btn = document.getElementById('scan-subtitles-btn');
        const resultDiv = document.getElementById('subtitle-scan-result');
        const resultContent = document.getElementById('scan-result-content');

        const forceRefresh = event && event.shiftKey;
        const url = forceRefresh ? '/admin/subtitles/scan?force=true' : '/admin/subtitles/scan';

        btn.disabled = true;
        btn.textContent = forceRefresh ? '⏳ Scanning (force refresh)...' : '⏳ Scanning...';
        resultDiv.style.display = 'none';

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
        })
            .then(response => response.json())
            .then(data => {
                const cacheNote = forceRefresh ? '' : '<small style="font-style: italic;">Results cached for 24 hours</small>';
                resultContent.innerHTML = `
                <div>Movies: ${data.movies_with_subs || 0} with subtitles, ${data.movies_missing || 0} missing (Total: ${data.total_movies || 0})</div>
                <div>Episodes: ${data.episodes_with_subs || 0} with subtitles, ${data.episodes_missing || 0} missing (Total: ${data.total_episodes || 0})</div>
                ${cacheNote}
            `;
                resultDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '🔍 Scan All Media for Subtitles';
            })
            .catch(err => {
                console.error('Error scanning subtitles:', err);
                alert('Error scanning subtitles: ' + err.message);
                btn.disabled = false;
                btn.textContent = '🔍 Scan All Media for Subtitles';
            });
    }

    function queueMissingSubtitles() {
        const btn = document.getElementById('queue-subtitles-btn');

        btn.disabled = true;
        btn.textContent = '⏳ Queueing...';

        fetch('/admin/subtitles/queue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
        })
            .then(response => response.json())
            .then(data => {
                alert(data.message || 'Subtitle queueing started in the background');
                btn.disabled = false;
                btn.textContent = '📥 Queue Missing Subtitles';
            })
            .catch(err => {
                console.error('Error queueing subtitles:', err);
                alert('Error queueing subtitles: ' + err.message);
                btn.disabled = false;
                btn.textContent = '📥 Queue Missing Subtitles';
            });
    }

    function syncAllSubtitles() {
        const btn = document.getElementById('sync-subtitles-btn');

        if (!confirm('This will trigger ffsubsync for all movies and episodes that have subtitles. This process runs in the background. Continue?')) {
            return;
        }

        btn.disabled = true;
        btn.textContent = '⏳ Syncing...';

        fetch('/api/admin/subtitles/sync/all', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
        })
            .then(response => response.json())
            .then(data => {
                alert(data.message || `Started background sync for ${data.count || 0} items`);
                btn.disabled = false;
                btn.textContent = '🔄 Sync All Subtitles';
            })
            .catch(err => {
                console.error('Error syncing subtitles:', err);
                alert('Error syncing subtitles: ' + err.message);
                btn.disabled = false;
                btn.textContent = '🔄 Sync All Subtitles';
            });
    }
</script>

<article>
    <h2>Subtitle Management</h2>
    <p><small>Scan media items and queue missing subtitles for download. Results cached 24 hours. Hold Shift to force a fresh scan.</small></p>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
        <button id="scan-subtitles-btn" onclick="scanSubtitles(event)" class="primary" style="width: 100%;">
            🔍 Scan All Media for Subtitles
        </button>
        <button id="queue-subtitles-btn" onclick="queueMissingSubtitles()" class="ok" style="width: 100%;">
            📥 Queue Missing Subtitles
        </button>
        <button id="sync-subtitles-btn" onclick="syncAllSubtitles()" class="warn" style="width: 100%;">
            🔄 Sync All Subtitles
        </button>
    </div>
    <div id="subtitle-scan-result" style="display: none; margin-top: 1rem;">
        <strong>Scan Results:</strong>
        <div id="scan-result-content"></div>
    </div>
</article>
{{end}}
