{{define "navigation"}}
<nav style="background: var(--header-bg); border-bottom: 1px solid var(--border-color); padding: 10px 20px;">
    <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; gap: 10px;">

        <a href="/dashboard" style="font-weight: 700; font-size: 18px; color: var(--text-color); text-decoration: none;">Arrgo</a>

        <div style="display: flex; flex-wrap: wrap; gap: 4px; flex: 1; align-items: center;">
            <a href="/dashboard" class="nav-link {{if eq .CurrentPage "/dashboard"}}active{{end}}">Dashboard</a>
            <a href="/movies" class="nav-link {{if eq .CurrentPage "/movies"}}active{{end}}">Movies</a>
            <a href="/shows" class="nav-link {{if eq .CurrentPage "/shows"}}active{{end}}">Shows</a>
            <a href="/requests" class="nav-link {{if eq .CurrentPage "/requests"}}active{{end}}">Requests</a>
            {{if .IsAdmin}}
            <a href="/admin" class="nav-link admin {{if eq .CurrentPage "/admin"}}active{{end}}">Admin</a>
            {{end}}
        </div>

        <form action="/search" method="GET">
            <input type="text" name="q" placeholder="Search..." value="{{.SearchQuery}}"
                autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
                style="padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 14px; width: 200px;">
        </form>

        <div style="display: flex; align-items: center; gap: 10px; border-left: 1px solid var(--border-color); padding-left: 10px;">
            <a href="/settings" style="color: var(--muted-text); font-size: 14px; text-decoration: none;">{{.Username}}</a>
            <a href="/logout" style="color: var(--accent-color); text-decoration: none; font-size: 14px; font-weight: 500;">Logout</a>
        </div>

    </div>
</nav>
{{end}}
