{{define "admin_danger_zone"}}
<article style="border-color: #c0392b;">
    <h2 style="color: #c0392b;">Danger Zone</h2>
    <p><small>These actions are permanent and cannot be undone.</small></p>
    <form action="/admin/nuke" method="POST"
        onsubmit="return confirm('WARNING: This will permanently delete ALL movies, shows, and requests from the database. This cannot be undone. Are you absolutely sure?')">
        <button type="submit" class="bad" style="width: 100%;">
            ☢️ Nuke Database (Library &amp; Requests)
        </button>
    </form>
</article>
{{end}}
